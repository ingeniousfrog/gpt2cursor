name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build macOS DMG
        run: npm run tauri:build

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: gpt2cursor-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run tauri build -- --bundles nsis

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: gpt2cursor-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Linux AppImage
        run: npm run tauri build -- --bundles appimage

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: gpt2cursor-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  publish:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: false
          body: |
            ## English

            ### Downloads
            - **macOS (Apple Silicon)**: `gpt2cursor_*_aarch64.dmg`
            - **Windows (x64)**: `gpt2cursor_*_x64-setup.exe`
            - **Linux (x64)**: `gpt2cursor_*_amd64.AppImage`

            ### What's New
            - **Agent history pre-trimming**: Large Cursor Agent histories are trimmed before Codex execution
            - **Clear oversized-body errors**: HTTP 413 plus UI hints to lower Context msgs or start a new Agent chat
            - **Apache 2.0 license**
            - **Docs**: ngrok required for both Ask and Agent modes

            ### Install — macOS
            1. Open the DMG and drag **gpt2cursor** onto **Applications**
            2. If macOS blocks first launch, run:
               ```sh
               xattr -cr /Applications/gpt2cursor.app
               ```

            ### Install — Windows
            1. Run the `.exe` installer
            2. If SmartScreen warns, choose **More info** → **Run anyway**

            ### Install — Linux
            1. Download the `.AppImage`
            2. `chmod +x gpt2cursor_*_amd64.AppImage`
            3. Run it directly

            ---

            ## 中文

            ### 下载
            - **macOS（Apple Silicon）**：`gpt2cursor_*_aarch64.dmg`
            - **Windows（x64）**：`gpt2cursor_*_x64-setup.exe`
            - **Linux（x64）**：`gpt2cursor_*_amd64.AppImage`

            ### 更新内容
            - **Agent 历史预裁剪**：过大的 Cursor Agent 历史会在调用 Codex 前自动裁剪
            - **请求过大时的明确提示**：返回 413，并在界面提示降低 Context msgs 或新开 Agent 会话
            - **Apache 2.0 许可证**
            - **文档修正**：Ask / Agent 均需 ngrok 公网地址

            ### 安装 — macOS
            1. 打开 DMG，拖到 **Applications**
            2. 若被拦截，执行：
               ```sh
               xattr -cr /Applications/gpt2cursor.app
               ```

            ### 安装 — Windows
            1. 运行 `.exe` 安装包
            2. SmartScreen 提示时选 **更多信息 → 仍要运行**

            ### 安装 — Linux
            1. 下载 `.AppImage`
            2. `chmod +x gpt2cursor_*_amd64.AppImage`
            3. 直接运行
